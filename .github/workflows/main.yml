name: Unity Test (PR Quality Gate)

on:
  pull_request:
    branches: ["main"]
  workflow_dispatch:

env:
  UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
  UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
  UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}

jobs:
  testRunner:
    name: "✅ Run Unity Tests"
    runs-on: ubuntu-latest
    steps:
      # Bước 1: Kéo mã nguồn kèm Git LFS
      - name: Checkout mã nguồn
        uses: actions/checkout@v4
        with:
          lfs: true

      # Bước 2: Cache thư mục Library để tăng tốc lần chạy sau
      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-Test-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-Test-

      # Bước 3: Chạy toàn bộ test (EditMode + PlayMode)
      # GameCI tự đọc phiên bản Unity từ ProjectSettings/ProjectVersion.txt
      - name: Chạy Unity Tests (EditMode & PlayMode)
        uses: game-ci/unity-test-runner@v4
        id: testRunner
        with:
          projectPath: .
          testMode: all
          githubToken: ${{ secrets.GITHUB_TOKEN }}

      # Bước 4: Lưu kết quả test dù pass hay fail
      - name: Upload kết quả Test
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Test-Results
          path: ${{ steps.testRunner.outputs.artifactsPath }}
